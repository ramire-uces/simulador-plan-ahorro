{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Proyecto{% endblock %}</title>

    <!-- CDN Bootstrap
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    -->

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Íconos (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Estilos globales -->
    <link rel="stylesheet" href="{% static 'css/globalStyles.css' %}">

    <!-- Espacio para estilos específicos de cada aplicación -->
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% block header %} {% include 'header.html' %} {% endblock %}  <!-- Header general -->

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block footer %} {% include 'footer.html' %} {% endblock %}  <!-- Footer general -->

    <!-- Espacio para código Javascript específicos de cada aplicación -->
    {% block extra_js %}{% endblock %}
</body>
</html>
